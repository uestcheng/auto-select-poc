# ──────────────────────────────────────────────
# suites.yaml – named test suites (tag-based)
# ──────────────────────────────────────────────
# Each suite lists Playwright @tag annotations.
# resolve-tests.ts statically scans spec source
# to find specs matching these tags.
# ──────────────────────────────────────────────

defaultSuite: smoke

suites:
  smoke:
    tags:
      - "@smoke"

